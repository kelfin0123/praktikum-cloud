version: '3.8'

services:
  app:
    build: .
    container_name: aplikasi-mahasiswa
    ports:
      - "8080:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 10s
      timeout: 5s
      retries: 3

  adminer:
    image: adminer:latest
    container_name: adminer
    ports:
      - "8081:8080"
    restart: unless-stopped